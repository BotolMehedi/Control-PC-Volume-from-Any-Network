<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Remotely Control Your PC Sound System</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <!-- QR Code Scanner -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
</head>

<body class="bg-black text-white">

    <!-- CONNECTION MODE SCREEN -->
    <div id="connection-screen"
        class="min-vh-100 d-flex align-items-center justify-content-center position-relative overflow-hidden">
        <div class="ambient-glow"></div>
        <div class="container position-relative z-2">
            <div class="text-center mb-5">
                <i class="bi bi-broadcast text-cyan fs-1 mb-3 d-block bounce"></i>
                <h2 class="fw-black tracking-wider text-uppercase">Connect</h2>
                <p class="text-white-50 small tracking-widest">Select Connection Method</p>
            </div>

            <div class="row g-3 justify-content-center">
                <div class="col-12 col-md-5">
                    <button id="btn-mode-auto"
                        class="btn glass-card w-100 p-4 text-start hover-scale border-0 text-white group">
                        <div class="d-flex align-items-center gap-3">
                            <div class="icon-circle icon-sm bg-cyan-10">
                                <i class="bi bi-qr-code-scan text-cyan fs-3"></i>
                            </div>
                            <div>
                                <h5 class="fw-bold mb-0">Auto Connect</h5>
                                <span class="small text-white-50">Scan QR from PC</span>
                            </div>
                            <i class="bi bi-chevron-right ms-auto text-white-20"></i>
                        </div>
                    </button>
                </div>
                <div class="col-12 col-md-5">
                    <button id="btn-mode-manual"
                        class="btn glass-card w-100 p-4 text-start hover-scale border-0 text-white group">
                        <div class="d-flex align-items-center gap-3">
                            <div class="icon-circle icon-sm bg-purple-10">
                                <i class="bi bi-keyboard text-purple fs-3"></i>
                            </div>
                            <div>
                                <h5 class="fw-bold mb-0">Manual Setup</h5>
                                <span class="small text-white-50">Enter PIN & URL</span>
                            </div>
                            <i class="bi bi-chevron-right ms-auto text-white-20"></i>
                        </div>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- QR SCANNER SCREEN -->
    <div id="scanner-screen" class="min-vh-100 d-none flex-column position-relative bg-black z-3">
        <div class="p-4 d-flex justify-content-between align-items-center position-relative z-10 glass-header">
            <button id="btn-scanner-back" class="btn btn-sm btn-glass-icon rounded-circle">
                <i class="bi bi-arrow-left fs-5"></i>
            </button>
            <span class="text-uppercase small fw-bold tracking-widest">Scan QR</span>
            <div style="width: 32px"></div>
        </div>

        <div class="flex-grow-1 position-relative overflow-hidden d-flex align-items-center bg-black">
            <div id="reader" style="width: 100%; border: none !important;"></div>
            <div class="scan-overlay"></div>
        </div>

        <div class="p-4 text-center glass-footer">
            <p class="text-white-50 small mb-0">Point camera at the QR code on your PC</p>
        </div>
    </div>

    <!-- LOGIN SCREEN -->
    <div id="login-screen"
        class="min-vh-100 d-none align-items-center justify-content-center position-relative overflow-hidden">
        <div class="ambient-glow"></div>

        <div class="container position-relative z-2">
            <div class="row justify-content-center">
                <div class="col-12 col-md-6 col-lg-4">
                    <div class="glass-card p-4 rounded-5 fade-in-up">
                        <div class="d-flex justify-content-end mb-3">
                            <button id="btn-settings"
                                class="btn btn-sm btn-outline-light rounded-circle border-0 text-white-50">
                                <i class="bi bi-gear-fill"></i>
                            </button>
                        </div>

                        <!-- Settings Panel (Hidden) -->
                        <div id="settings-panel" class="mb-4 d-none">
                            <label class="form-label text-cyan text-uppercase small fw-bold tracking-widest">Server
                                URL</label>
                            <input type="text" id="server-url"
                                class="form-control bg-dark border-secondary text-white shadow-none"
                                placeholder="https://....loca.lt">
                        </div>

                        <div class="text-center mb-4">
                            <div class="icon-circle mx-auto mb-3">
                                <i class="bi bi-lock-fill text-cyan fs-1"></i>
                            </div>
                            <h2 class="fw-black tracking-wider">SECURE LINK</h2>
                            <p class="text-white-50 small text-uppercase tracking-widest">Enter Access PIN</p>
                        </div>

                        <!-- PIN Dots -->
                        <div class="d-flex justify-content-center gap-3 mb-4" id="pin-display">
                            <div class="pin-dot"></div>
                            <div class="pin-dot"></div>
                            <div class="pin-dot"></div>
                            <div class="pin-dot"></div>
                        </div>

                        <!-- Keypad -->
                        <div class="row g-2">
                            <div class="col-4"><button class="btn btn-keypad w-100" data-key="1">1</button></div>
                            <div class="col-4"><button class="btn btn-keypad w-100" data-key="2">2</button></div>
                            <div class="col-4"><button class="btn btn-keypad w-100" data-key="3">3</button></div>
                            <div class="col-4"><button class="btn btn-keypad w-100" data-key="4">4</button></div>
                            <div class="col-4"><button class="btn btn-keypad w-100" data-key="5">5</button></div>
                            <div class="col-4"><button class="btn btn-keypad w-100" data-key="6">6</button></div>
                            <div class="col-4"><button class="btn btn-keypad w-100" data-key="7">7</button></div>
                            <div class="col-4"><button class="btn btn-keypad w-100" data-key="8">8</button></div>
                            <div class="col-4"><button class="btn btn-keypad w-100" data-key="9">9</button></div>
                            <div class="col-4"><button class="btn btn-keypad-action w-100 text-danger"
                                    id="btn-del">DEL</button></div>
                            <div class="col-4"><button class="btn btn-keypad w-100" data-key="0">0</button></div>
                            <div class="col-4"><button class="btn btn-keypad-primary w-100 text-white"
                                    id="btn-go">GO</button></div>
                        </div>

                        <div id="login-error" class="text-danger text-center mt-3 small fw-bold d-none">Invalid PIN
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- MAIN APP SCREEN -->
    <div id="app-screen" class="min-vh-100 d-none flex-column position-relative overflow-hidden">
        <div class="app-bg-glow"></div>

        <!-- Header -->
        <div class="container pt-4 position-relative z-2">
            <div class="d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center gap-2">
                    <i class="bi bi-wifi text-cyan"></i>
                    <span class="text-uppercase small fw-bold text-cyan tracking-widest">Connected</span>
                </div>
                <div class="status-indicator bg-success rounded-circle"></div>
            </div>
        </div>

        <!-- Volume Control -->
        <div
            class="flex-grow-1 d-flex flex-column align-items-center justify-content-center position-relative z-2 py-4">

            <!-- Volume Display -->
            <div class="mb-4 text-center">
                <h1 class="display-2 fw-black mb-0 text-white tracking-tight" id="vol-display">50</h1>
                <span class="text-uppercase small text-white-50 tracking-widest">Global Volume</span>
            </div>

            <!-- Horizontal Controls -->
            <div class="d-flex align-items-center gap-3 w-100 px-4 mb-4" style="max-width: 400px;">
                <button id="btn-vol-down" class="btn btn-glass-icon p-3 rounded-circle">
                    <i class="bi bi-dash-lg fs-4"></i>
                </button>

                <div class="flex-grow-1 position-relative">
                    <input type="range" class="form-range custom-range" id="vol-slider" min="0" max="100" value="50">
                </div>

                <button id="btn-vol-up" class="btn btn-glass-icon p-3 rounded-circle">
                    <i class="bi bi-plus-lg fs-4"></i>
                </button>
            </div>

            <!-- Mute Button -->
            <button id="btn-mute" class="btn btn-glass-icon p-3 rounded-4 mt-3">
                <i class="bi bi-volume-up-fill fs-3" id="icon-mute"></i>
            </button>

        </div>

        <!-- Media Controls -->
        <div class="container pb-5 position-relative z-2">
            <div class="glass-card rounded-5 p-4">
                <div class="d-flex justify-content-between align-items-center px-2">
                    <button class="btn btn-glass-icon p-3 rounded-circle" id="btn-prev">
                        <i class="bi bi-skip-backward-fill fs-4"></i>
                    </button>

                    <button class="btn btn-action p-4 rounded-4" id="btn-playpause">
                        <i class="bi bi-play-fill fs-1" id="icon-play"></i>
                    </button>

                    <button class="btn btn-glass-icon p-3 rounded-circle" id="btn-next">
                        <i class="bi bi-skip-forward-fill fs-4"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
